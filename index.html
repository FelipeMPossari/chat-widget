<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XChannel WebChat Widget Demo</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        color: #18212f;
        background: #f5f7fb;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(960px, calc(100% - 48px));
        margin: 0 auto;
        padding: 56px 0;
      }

      section {
        display: grid;
        gap: 18px;
        max-width: 640px;
      }

      h1 {
        margin: 0;
        font-size: 34px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        max-width: 58ch;
        color: #5b6677;
        font-size: 16px;
        line-height: 1.6;
      }

      code {
        display: block;
        width: fit-content;
        max-width: 100%;
        padding: 12px 14px;
        overflow: auto;
        border: 1px solid #d9e0ea;
        border-radius: 8px;
        color: #243145;
        background: #fff;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>XChannel WebChat Widget</h1>
        <p>
          Pagina hospedeira de desenvolvimento. O script abaixo injeta o widget
          como Web Component com Shadow DOM, sem depender do CSS desta pagina.
        </p>
        <code>
          &lt;script src="/xchannel-webchat.js"
          data-widget-key="demo-widget"&gt;&lt;/script&gt;
        </code>
      </section>
    </main>

    <script
      type="module"
      src="/src/index.tsx"
      data-widget-key="demo-widget"
      data-demo-mode="true"
      data-position="right"
    ></script>
  </body>
</html>
